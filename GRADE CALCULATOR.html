<!DOCTYPE html>
<html>
<head>
    <title>SGPA Calculator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin: 30px;
        }
        table {
            margin: auto;
            border-collapse: collapse;
        }
        td, th {
            border: 1px solid black;
            padding: 10px;
        }
        input, select {
            padding: 5px;
        }
        button {
            padding: 10px 20px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<h2>SGPA Calculator</h2>

<table id="gradeTable">
    <tr>
        <th>Subject</th>
        <th>Credits</th>
        <th>Grade</th>
    </tr>
</table>

<button onclick="addRow()">Add Subject</button>
<button onclick="calculateSGPA()">Calculate SGPA</button>

<h3 id="result"></h3>

<script>
function addRow() {
    let table = document.getElementById("gradeTable");
    let row = table.insertRow();

    row.innerHTML = `
        <td><input type="text"></td>
        <td><input type="number" min="1"></td>
        <td>
            <select>
                <option value="10">O</option>
                <option value="9">E</option>
                <option value="8">A</option>
                <option value="7">B</option>
                <option value="6">C</option>
                <option value="5">D</option>
                <option value="0">F</option>
            </select>
        </td>
    `;
}

function calculateSGPA() {
    let table = document.getElementById("gradeTable");
    let totalCredits = 0;
    let totalPoints = 0;

    for(let i = 1; i < table.rows.length; i++) {
        let credits = Number(table.rows[i].cells[1].children[0].value);
        let grade = Number(table.rows[i].cells[2].children[0].value);

        totalCredits += credits;
        totalPoints += credits * grade;
    }

    let sgpa = totalPoints / totalCredits;
    document.getElementById("result").innerHTML =
        "Your SGPA: " + sgpa.toFixed(2);
}
</script>

</body>
</html>
